services:
  # ---- Sentinel NVR Backend ----
  sentinel:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentinel-nvr
    restart: unless-stopped
    ports:
      - "8099:8099"
    volumes:
      - ./configs/sentinel.yml:/etc/sentinel/sentinel.yml:ro
      - sentinel-data:/data
      # On Linux, create these dirs and chown to UID 10001 (sentinel user):
      #   sudo mkdir -p media/hot media/cold && sudo chown -R 10001:10001 media/
      - ./media/hot:/media/hot
      - ./media/cold:/media/cold
    # GPU device passthrough — uncomment the relevant lines:
    #
    # Intel iGPU (VAAPI/QSV):
    #   devices:
    #     - /dev/dri:/dev/dri
    #
    # Coral USB TPU:
    #   devices:
    #     - /dev/bus/usb:/dev/bus/usb
    #
    # NVIDIA GPU — uncomment the deploy block below and run with:
    #   docker compose up (requires nvidia-container-toolkit installed)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    environment:
      - TZ=America/New_York
      # NVIDIA runtime hint (used by nvidia-container-toolkit)
      # - NVIDIA_VISIBLE_DEVICES=all
      # - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
    depends_on:
      go2rtc:
        condition: service_healthy
    healthcheck:
      # Health endpoint returns 503 when subsystems are degraded, so wget exit code
      # reflects actual system health — not just "process is alive".
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8099/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - backend
      - frontend

  # ---- go2rtc Stream Broker ----
  # Handles RTSP intake and re-streaming for all cameras.
  # Streams are managed dynamically by the sentinel backend via REST API.
  # Phase 3 will add WebRTC/MSE live view through go2rtc.
  go2rtc:
    image: alexxit/go2rtc:1.9.14
    container_name: sentinel-go2rtc
    restart: unless-stopped
    ports:
      - "127.0.0.1:1984:1984"    # REST API + WebUI (localhost only — no auth on this API)
      - "8555:8554"               # RTSP re-stream (8555 on host to avoid conflict with rtsp-test)
    volumes:
      - ./configs/go2rtc.yaml:/config/go2rtc.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:1984/api/streams"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - backend

  # ---- Test RTSP Server ----
  # Provides a synthetic RTSP stream for development/testing.
  # Only starts with: docker compose --profile dev up
  # Push a test stream: ffmpeg -re -f lavfi -i testsrc2=size=1280x720:rate=15 -c:v libx264 -f rtsp rtsp://localhost:8554/stream
  # Access from other containers at: rtsp://rtsp-test:8554/stream
  rtsp-test:
    image: bluenviron/mediamtx:1.12.2
    container_name: sentinel-rtsp-test
    profiles: ["dev"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:8554:8554"   # RTSP (localhost only — dev tool)
      - "127.0.0.1:1935:1935"   # RTMP (localhost only — dev tool)
      - "127.0.0.1:8888:8888"   # HLS  (localhost only — dev tool)
    environment:
      - MTX_PROTOCOLS=tcp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend

  # ---- Frontend (dev server) ----
  # No healthcheck — Vite dev server doesn't serve /health and the frontend is not
  # a critical backend dependency. Production will use nginx with a static build.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sentinel-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - sentinel
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - frontend

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge

volumes:
  sentinel-data:
