# go2rtc configuration for Sentinel NVR
# Streams are managed dynamically via the REST API by the sentinel backend.
# Do NOT add streams here — use the Sentinel NVR web UI or API instead.

api:
  listen: ":1984"

rtsp:
  listen: ":8554"

# WebRTC — Phase 12: enabled for remote access via TURN relay (CG11, R8).
# ICE servers must match relay.turn_server/turn_user/turn_pass in sentinel.yml.
webrtc:
  listen: ":8555"
  candidates:
    - "stun:8555"    # resolve LAN/public IP via STUN; advertise on UDP port 8555
  ice_servers:
    - urls: [ "stun:stun.l.google.com:19302" ]
    # Uncomment and match sentinel.yml relay.* when relay.enabled: true:
    # - urls: [ "turn:coturn:3478" ]
    #   username: "sentinel"
    #   credential: "changeme"

log:
  level: info
