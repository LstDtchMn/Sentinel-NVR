# Sentinel NVR Configuration
# This file is the single source of truth — edited by the Web UI or by hand.

server:
  host: "0.0.0.0"
  port: 8099
  log_level: "info"     # debug | info | warn | error

auth:
  enabled: true                        # false = disable auth (dev/trusted-LAN only)
  access_token_ttl: 900                # Access token lifetime in seconds (15 min)
  refresh_token_ttl: 604800            # Refresh token lifetime in seconds (7 days)
  secure_cookie: false                 # true = set Secure flag on cookies (requires HTTPS)
  allowed_origins:                     # CORS origins allowed for cookie auth (Vite dev server)
    - "http://localhost:5173"

notifications:
  enabled: false              # true = dispatch push/webhook notifications on detection and camera events (R9)
  retry_interval: 60          # Seconds between crash-recovery scans for unsent (pending) log rows

  fcm:                        # Firebase Cloud Messaging — Android + cross-platform push
    service_account_json: ""  # Absolute path to Google service account .json file
                              # Obtain: Firebase Console → Project Settings → Service Accounts → Generate key

  apns:                       # Apple Push Notification service — iOS / macOS push
    key_path: ""              # Absolute path to .p8 auth key file
                              # Obtain: Apple Developer → Certificates, Identifiers & Profiles → Keys
    key_id: ""                # 10-character key identifier shown on Apple Developer portal
    team_id: ""               # 10-character Apple team identifier
    bundle_id: ""             # App bundle ID, e.g. "com.example.SentinelNVR"
    sandbox: false            # true = development APNs endpoint; false = production

storage:
  hot_path: "/media/hot"       # Fast storage (SSD) — recent recordings
  cold_path: "/media/cold"     # Archival storage (HDD/NAS)
  hot_retention_days: 3        # Days to keep on hot storage
  cold_retention_days: 30      # Days to keep on cold storage
  segment_duration: 10         # Recording segment length in minutes
  segment_format: "mp4"        # mp4 (independently playable) | mkv

database:
  path: "/data/sentinel.db"
  wal_mode: true               # Write-Ahead Logging for crash resistance

detection:
  enabled: false
  backend: "remote"            # remote (CodeProject.AI HTTP API) | mock (for testing) | openvino/tensorrt/coreml/coral (Phase 11)
  remote_url: "http://codeproject-ai:32168"  # HTTP endpoint for remote detection backend
  frame_interval: 5            # Seconds between frame grabs per camera
  snapshot_path: "/data/snapshots"  # Absolute path for detection JPEG snapshots
  model: "general_security"    # Model name (used by local backends in Phase 11)
  gpu_device: "auto"           # auto | /dev/dri/renderD128 | cuda:0 | etc.
  confidence_threshold: 0.6    # Minimum confidence [0.0–1.0] to publish a detection event

  # Phase 13: Advanced AI features (R11, R12)
  # face_recognition:              # Opt-in face identification (requires ArcFace ONNX model in sentinel-infer)
  #   enabled: false               # true = run face matching on "person" detections
  #   match_threshold: 0.6         # Cosine similarity threshold [0.0–1.0]; higher = stricter
  #   max_faces_per_frame: 5       # Limit face crops per frame to reduce inference load
  # audio_classification:          # Opt-in audio event detection (requires YAMNet ONNX model)
  #   enabled: false               # true = classify audio from camera streams
  #   confidence_threshold: 0.7    # Minimum classification score to publish event
  #   sample_interval: 3           # Seconds between audio samples per camera

go2rtc:
  api_url: "http://go2rtc:1984"     # Override with GO2RTC_API env var
  rtsp_url: "rtsp://go2rtc:8554"    # Container-internal port; host port is 8555. Override with GO2RTC_RTSP env var.

cameras: []
  # Example camera configuration:
  # - name: "Front Door"
  #   enabled: true
  #   main_stream: "rtsp://user:pass@192.168.1.100:554/stream1"
  #   sub_stream: "rtsp://user:pass@192.168.1.100:554/stream2"
  #   record: true
  #   detect: true
  #   onvif:
  #     host: "192.168.1.100"
  #     port: 80
  #     user: "admin"
  #     password: "admin"

watchdog:
  enabled: true
  health_interval: 30          # Seconds between health checks
  restart_delay: 5             # Seconds to wait before restarting a failed component

